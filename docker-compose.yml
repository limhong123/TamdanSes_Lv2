services:
  backend:
    build: ./backend
    container_name: school_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:limhong@host.docker.internal:5432/TamdanSes

  frontend:
    build: ./frontend
    container_name: school_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend